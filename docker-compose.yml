version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: grocio_postgres
    environment:
      POSTGRES_DB: grocio_dev
      POSTGRES_USER: grocio_user
      POSTGRES_PASSWORD: grocio_password
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pg_trgm"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grocio_user -d grocio_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grocio_network

  redis:
    image: redis:7-alpine
    container_name: grocio_redis
    command: redis-server --appendonly yes --requirepass redis_password
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grocio_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grocio_api
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://grocio_user:grocio_password@postgres:5432/grocio_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      API_PREFIX: /api/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - grocio_network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: grocio_web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api
    networks:
      - grocio_network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  grocio_network:
    driver: bridge
